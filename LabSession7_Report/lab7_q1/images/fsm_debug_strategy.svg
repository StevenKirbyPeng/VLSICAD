<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <linearGradient id="red" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff0f0"/>
    <stop offset="100%" stop-color="#ffd6d6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:36px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:22px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:17px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:14px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.4;rx:18;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:3.4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:2.8;stroke-dasharray:8 7;fill:none}
.phase{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:19px;font-weight:bold;fill:#174b78}
</style>
</defs>
<rect width="1400" height="600" fill="url(#bg)"/>

<text x="50" y="60" class="title">FSM-Based Debug Strategy</text>
<rect x="80" y="125" width="270" height="110" fill="url(#blue)" class="box"/>
<text x="120" y="170" class="txt">Image shifted?</text><text x="115" y="205" class="small">Check S_LOAD / S_DRAW_WRITE</text>
<path d="M350 180 H430" class="arrow"/>
<rect x="430" y="125" width="270" height="110" fill="url(#green)" class="box"/>
<text x="470" y="170" class="txt">Wrong mask?</text><text x="460" y="205" class="small">Check S_OTSU / S_POLARITY</text>
<path d="M700 180 H780" class="arrow"/>
<rect x="780" y="125" width="270" height="110" fill="url(#purple)" class="box"/>
<text x="820" y="170" class="txt">Wrong objects?</text><text x="807" y="205" class="small">Check S_CCL_SCAN</text>
<path d="M1050 180 H1130" class="arrow"/>
<rect x="1130" y="125" width="220" height="110" fill="url(#orange)" class="box"/>
<text x="1160" y="170" class="txt">Wrong box?</text><text x="1153" y="205" class="small">Check BBox / BoxMap</text>

<rect x="170" y="355" width="1060" height="145" fill="#fff" stroke="#c5d7e6" stroke-width="2" rx="18"/>
<text x="215" y="400" class="txt">Recommended waveform signals</text>
<text x="215" y="438" class="small">state, next_state, addr_cnt, Img_A, Img_Q, threshold, mask, label, bbox_xmin/xmax/ymin/ymax, Ans_A, Ans_D, done</text>
<text x="215" y="470" class="small">By checking these signals state-by-state, errors can be isolated quickly instead of only looking at the final BMP.</text>

</svg>