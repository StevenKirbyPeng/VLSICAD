<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
<defs><linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#eef6ff"/><stop offset="1" stop-color="#f8fbff"/></linearGradient><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".16"/></filter></defs>
<rect width="1100" height="420" rx="28" fill="url(#bg)"/>
<text x="550" y="52" text-anchor="middle" font-family="Microsoft JhengHei, Arial" font-size="30" font-weight="800" fill="#0f172a">SuperLint Coverage 檢查流程（含所有 Verilog / SystemVerilog 檔案）</text>
<g font-family="Microsoft JhengHei, Arial" font-size="18" font-weight="700">
<rect x="55" y="110" width="210" height="100" rx="20" fill="#fff" stroke="#60a5fa" stroke-width="3" filter="url(#s)"/><text x="160" y="150" text-anchor="middle" fill="#1e3a8a">加入所有檔案</text><text x="160" y="180" text-anchor="middle" font-size="14" fill="#475569">drawBbox.v / tb.sv / CYCLE_MAX.sv</text>
<rect x="325" y="110" width="210" height="100" rx="20" fill="#fff" stroke="#34d399" stroke-width="3" filter="url(#s)"/><text x="430" y="150" text-anchor="middle" fill="#065f46">執行 make superlint</text><text x="430" y="180" text-anchor="middle" font-size="14" fill="#475569">或開啟 SuperLint GUI</text>
<rect x="595" y="110" width="210" height="100" rx="20" fill="#fff" stroke="#f59e0b" stroke-width="3" filter="url(#s)"/><text x="700" y="150" text-anchor="middle" fill="#92400e">查看 Coverage</text><text x="700" y="180" text-anchor="middle" font-size="14" fill="#475569">確認所有檔案都有納入</text>
<rect x="865" y="110" width="180" height="100" rx="20" fill="#fff" stroke="#22c55e" stroke-width="3" filter="url(#s)"/><text x="955" y="150" text-anchor="middle" fill="#166534">達成 ≥ 90%</text><text x="955" y="180" text-anchor="middle" font-size="14" fill="#475569">截圖放入報告</text>
<path d="M270 160 H315" stroke="#334155" stroke-width="5" marker-end="url(#a)"/><path d="M540 160 H585" stroke="#334155" stroke-width="5"/><path d="M810 160 H855" stroke="#334155" stroke-width="5"/>
<rect x="150" y="270" width="800" height="78" rx="18" fill="#0f172a" opacity=".92"/><text x="550" y="305" text-anchor="middle" fill="#dbeafe" font-size="18">重點：不要只檢查單一 drawBbox.v；若有額外 submodule，也必須加入 SuperLint project。</text><text x="550" y="334" text-anchor="middle" fill="#bbf7d0" font-size="18">報告中需要顯示包含所有檔案的總 coverage，並說明 warning 是否已修正或不影響功能。</text>
</g></svg>