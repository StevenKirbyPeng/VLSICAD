<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
<style>.bg{fill:#f8fafc}.card{fill:white;stroke:#cbd5e1;stroke-width:2}.axis{stroke:#94a3b8;stroke-width:1}.sig{fill:none;stroke:#2563eb;stroke-width:3}.sig2{fill:none;stroke:#16a34a;stroke-width:3}.sig3{fill:none;stroke:#dc2626;stroke-width:3}.txt{font-family:Arial,'Noto Sans TC',sans-serif;fill:#0f172a;font-size:18px;font-weight:700}.sub{font-family:Arial,'Noto Sans TC',sans-serif;fill:#475569;font-size:14px}.label{font-family:Consolas,monospace;fill:#0f172a;font-size:15px}.phase{fill:#eff6ff;stroke:#93c5fd}.phase2{fill:#ecfdf5;stroke:#86efac}.phase3{fill:#fff7ed;stroke:#fdba74}</style>
