<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
<style>.bg{fill:#f8fafc}.card{fill:white;stroke:#cbd5e1;stroke-width:2}.txt{font-family:Arial,'Noto Sans TC',sans-serif;fill:#0f172a;font-size:18px;font-weight:800}.sub{font-family:Arial,'Noto Sans TC',sans-serif;fill:#475569;font-size:14px}.label{font-family:Consolas,monospace;fill:#0f172a;font-size:15px}.h{stroke:#2563eb;stroke-width:3;fill:none}.g{stroke:#16a34a;stroke-width:3;fill:none}.r{stroke:#dc2626;stroke-width:3;fill:none}.o{stroke:#f97316;stroke-width:3;fill:none}.grid{stroke:#e2e8f0;stroke-width:1}.zone{fill:#eef2ff;stroke:#a5b4fc}.zone2{fill:#ecfdf5;stroke:#86efac}</style>
<rect class="bg" width="1200" height="560"/><rect class="card" x="30" y="26" width="1140" height="500" rx="22"/>
<text class="txt" x="60" y="62">Memory Interface Waveform：ImgROM 讀取、UrSRAM 中間結果、AnsSRAM 最終寫入</text>
<text class="sub" x="60" y="88">CEN 為 active low；WEN = 0 表示 write，WEN = 1 表示 read。</text>
<g transform="translate(190,130)">
<g><line class="grid" x1="0" y1="0" x2="900" y2="0"/><line class="grid" x1="0" y1="60" x2="900" y2="60"/><line class="grid" x1="0" y1="120" x2="900" y2="120"/><line class="grid" x1="0" y1="180" x2="900" y2="180"/><line class="grid" x1="0" y1="240" x2="900" y2="240"/><line class="grid" x1="0" y1="300" x2="900" y2="300"/></g>
<text class="label" x="-140" y="5">Img_CEN</text><path class="r" d="M0 -15 L90 -15 L90 15 L300 15 L300 -15 L900 -15"/>
<text class="label" x="-140" y="65">Img_A</text><path class="h" d="M0 60 L95 60 L130 42 L165 60 L200 42 L235 60 L270 42 L305 60 L900 60"/><text class="sub" x="120" y="34">0 → 65535</text>
<text class="label" x="-140" y="125">Img_Q</text><path class="g" d="M0 120 L110 120 L150 100 L190 120 L230 100 L270 120 L310 100 L350 120 L900 120"/><text class="sub" x="145" y="93">RGB 32-bit data</text>
<text class="label" x="-140" y="185">Ur_WEN</text><path class="o" d="M0 165 L330 165 L330 195 L620 195 L620 165 L900 165"/><text class="sub" x="365" y="218">mask/中間結果寫入，WEN=0</text>
<text class="label" x="-140" y="245">Ans_WEN</text><path class="r" d="M0 225 L650 225 L650 255 L860 255 L860 225 L900 225"/><text class="sub" x="675" y="280">最後 overlay 寫入 AnsSRAM</text>
<text class="label" x="-140" y="305">done</text><path class="g" d="M0 315 L860 315 L860 285 L900 285"/>
<rect class="zone" x="90" y="335" width="210" height="48" rx="10"/><text class="sub" x="120" y="365">讀 ImgROM / 建立資料</text>
<rect class="zone2" x="330" y="335" width="290" height="48" rx="10"/><text class="sub" x="370" y="365">UrSRAM 寫入 mask debug</text>
<rect class="zone" x="650" y="335" width="210" height="48" rx="10"/><text class="sub" x="685" y="365">AnsSRAM 寫入結果</text>
</g>
</svg>
