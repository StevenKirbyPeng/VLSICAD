<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <linearGradient id="red" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff0f0"/>
    <stop offset="100%" stop-color="#ffd6d6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:36px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:22px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:17px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:14px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.4;rx:18;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:3.4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:2.8;stroke-dasharray:8 7;fill:none}
.phase{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:19px;font-weight:bold;fill:#174b78}
</style>
</defs>
<rect width="1400" height="620" fill="url(#bg)"/>

<text x="50" y="60" class="title">Memory Interface Design</text>

<rect x="80" y="130" width="330" height="150" fill="url(#blue)" class="box"/>
<text x="125" y="178" class="txt">ImgROM Interface</text>
<text x="125" y="214" class="small">Img_CEN = active low read enable</text>
<text x="125" y="244" class="small">Img_A = 16-bit address</text>
<text x="125" y="270" class="small">Img_Q = 32-bit RGB input</text>

<rect x="535" y="130" width="330" height="150" fill="url(#green)" class="box"/>
<text x="580" y="178" class="txt">UrSRAM Interface</text>
<text x="580" y="214" class="small">Ur_CEN = active low chip enable</text>
<text x="580" y="244" class="small">Ur_WEN: 0 write / 1 read</text>
<text x="580" y="270" class="small">Ur_A / Ur_D / Ur_Q = temp data</text>

<rect x="990" y="130" width="330" height="150" fill="url(#orange)" class="box"/>
<text x="1035" y="178" class="txt">AnsSRAM Interface</text>
<text x="1035" y="214" class="small">Ans_CEN = active low chip enable</text>
<text x="1035" y="244" class="small">Ans_WEN: 0 write / 1 read</text>
<text x="1035" y="270" class="small">Ans_D = final RGB output</text>

<rect x="180" y="405" width="1040" height="135" fill="#fff" stroke="#c5d7e6" stroke-width="2" rx="18"/>
<text x="220" y="450" class="txt">Address mapping</text>
<text x="220" y="488" class="small">The 256×256 image is scanned in row-major order: addr = row × 256 + col.</text>
<text x="220" y="520" class="small">Because the address is 16 bits, it can cover 0 ~ 65535 pixels.</text>

</svg>