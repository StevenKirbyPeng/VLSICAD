<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:34px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:23px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:18px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:15px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.5;rx:20;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:3;stroke-dasharray:8 7;fill:none}
</style>
</defs>
<rect width="1200" height="680" fill="url(#bg)"/>

<text x="55" y="62" class="title">Design Compiler Synthesis Flow</text>
<rect x="60" y="120" width="185" height="88" fill="url(#blue)" class="box"/>
<text x="92" y="158" class="txt">RTL Input</text><text x="90" y="188" class="small">drawBbox.v</text>
<path d="M245 164 H325" class="arrow"/>
<rect x="325" y="120" width="185" height="88" fill="url(#green)" class="box"/>
<text x="360" y="158" class="txt">Link</text><text x="348" y="188" class="small">current_design</text>
<path d="M510 164 H590" class="arrow"/>
<rect x="590" y="120" width="210" height="88" fill="url(#orange)" class="box"/>
<text x="625" y="158" class="txt">Constraints</text><text x="640" y="188" class="small">DC.sdc / 10 ns</text>
<path d="M800 164 H880" class="arrow"/>
<rect x="880" y="120" width="230" height="88" fill="url(#purple)" class="box"/>
<text x="925" y="158" class="txt">Compile</text><text x="905" y="188" class="small">map + area effort high</text>

<path d="M995 208 V290" class="arrow"/>
<rect x="820" y="290" width="350" height="105" fill="url(#blue)" class="box"/>
<text x="870" y="330" class="txt">Generated Reports</text>
<text x="850" y="362" class="small">timing_max_rpt / timing_min_rpt</text>
<text x="850" y="388" class="small">area_rpt / power_rpt</text>

<path d="M820 342 H710" class="arrow"/>
<rect x="450" y="290" width="260" height="105" fill="url(#green)" class="box"/>
<text x="492" y="330" class="txt">Netlist Output</text>
<text x="490" y="362" class="small">drawBbox_syn.v</text>
<text x="500" y="388" class="small">drawBbox_syn.sdf</text>

<path d="M450 342 H330" class="arrow"/>
<rect x="60" y="290" width="270" height="105" fill="url(#orange)" class="box"/>
<text x="102" y="330" class="txt">Gate Simulation</text>
<text x="95" y="362" class="small">SDF timing annotation</text>
<text x="98" y="388" class="small">P1~P4 SYN verify</text>

<text x="70" y="485" class="small">Goal: make the synthesized hardware meet 10 ns timing, produce area report, and verify gate-level behavior.</text>
<rect x="60" y="525" width="1050" height="105" rx="18" fill="#fff" stroke="#c5d7e6" stroke-width="2"/>
<text x="90" y="565" class="txt">Key check points</text>
<text x="90" y="598" class="small">1. area_rpt.txt → Total cell area　　2. timing_max_rpt.txt → setup slack　　3. drawBbox_syn.sdf → post-synthesis timing simulation</text>

</svg>