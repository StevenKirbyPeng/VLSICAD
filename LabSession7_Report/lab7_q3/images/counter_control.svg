<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="650" viewBox="0 0 1400 650">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <linearGradient id="red" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff0f0"/>
    <stop offset="100%" stop-color="#ffd6d6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:36px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:22px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:17px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:14px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.4;rx:18;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:3.4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:2.8;stroke-dasharray:8 7;fill:none}
.phase{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:19px;font-weight:bold;fill:#174b78}
</style>
</defs>
<rect width="1400" height="650" fill="url(#bg)"/>

<text x="50" y="60" class="title">Counter and State Transition Concept</text>
<rect x="80" y="130" width="350" height="150" fill="url(#blue)" class="box"/>
<text x="125" y="175" class="txt">addr_cnt</text>
<text x="125" y="210" class="small">0 → 65535</text>
<text x="125" y="242" class="small">row = addr[15:8], col = addr[7:0]</text>

<path d="M430 205 H520" class="arrow"/>
<rect x="520" y="130" width="350" height="150" fill="url(#green)" class="box"/>
<text x="565" y="175" class="txt">stage_done</text>
<text x="565" y="210" class="small">counter reaches last pixel</text>
<text x="565" y="242" class="small">or threshold loop reaches 255</text>

<path d="M870 205 H960" class="arrow"/>
<rect x="960" y="130" width="350" height="150" fill="url(#orange)" class="box"/>
<text x="1005" y="175" class="txt">next_state</text>
<text x="1005" y="210" class="small">reset counter</text>
<text x="1005" y="242" class="small">enter next processing phase</text>

<rect x="160" y="405" width="1080" height="145" fill="#fff" stroke="#c5d7e6" stroke-width="2" rx="18"/>
<text x="200" y="450" class="txt">Why this matters?</text>
<text x="200" y="488" class="small">Image size is 256×256, so each full-image state scans 65536 pixels. Correct counter reset prevents address offset and pixel mismatch.</text>
<text x="200" y="520" class="small">Threshold states use smaller loop counters, while CCL/BBox/Draw states scan memory again with synchronized address control.</text>

</svg>