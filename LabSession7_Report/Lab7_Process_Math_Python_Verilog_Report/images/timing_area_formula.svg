<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:34px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:23px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:18px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:15px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.5;rx:20;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:3;stroke-dasharray:8 7;fill:none}
</style>
</defs>
<rect width="1200" height="680" fill="url(#bg)"/>

<text x="55" y="60" class="title">What should be filled in the Summary table?</text>
<rect x="70" y="120" width="320" height="120" fill="url(#blue)" class="box"/>
<text x="105" y="165" class="txt">Clock Period</text>
<text x="105" y="205" class="small">10.0 ns from DC.sdc</text>

<rect x="440" y="120" width="320" height="120" fill="url(#green)" class="box"/>
<text x="475" y="165" class="txt">Total Cell Area</text>
<text x="475" y="205" class="small">area_rpt.txt → Total cell area</text>

<rect x="810" y="120" width="320" height="120" fill="url(#orange)" class="box"/>
<text x="845" y="165" class="txt">P4 Simulation Time</text>
<text x="845" y="205" class="small">ModelSim log time</text>

<path d="M230 240 V320 H970 V240" class="dash"/>
<rect x="280" y="330" width="640" height="115" fill="url(#purple)" class="box"/>
<text x="350" y="375" class="txt">PA Rank Metric</text>
<text x="350" y="415" class="small">Area × P4 Simulation Time</text>

<rect x="80" y="510" width="1040" height="95" rx="18" fill="#fff" stroke="#c5d7e6" stroke-width="2"/>
<text x="110" y="550" class="small">In this report, RTL P1~P4 are PASS with 0 errors; synthesis area must be filled after running Design Compiler.</text>
<text x="110" y="582" class="small">Do not invent Total cell area. Use only the value produced by report_area -nosplit.</text>

</svg>