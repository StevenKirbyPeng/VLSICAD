<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
<defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#0f766e"/><stop offset="1" stop-color="#2563eb"/></linearGradient><filter id="s" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity=".18"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>
<rect width="1200" height="520" fill="#f8fafc"/>
<text x="600" y="44" font-size="30" font-family="Arial, Noto Sans TC" font-weight="800" text-anchor="middle" fill="#0f172a">Lab7 Synthesis Optimization Flow</text>
<text x="600" y="78" font-size="16" font-family="Arial, Noto Sans TC" text-anchor="middle" fill="#64748b">以 timing closure、cell area、memory interface 穩定性為核心，逐步把長 datapath 拆成可合成的 FSM 階段</text>
<g font-family="Arial, Noto Sans TC" font-size="16" font-weight="700" fill="#0f172a">
<rect x="45" y="130" width="190" height="90" rx="18" fill="#fff" stroke="#cbd5e1" filter="url(#s)"/><text x="140" y="168" text-anchor="middle">問題定位</text><text x="140" y="195" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">timing / area / latency</text>
<rect x="275" y="130" width="190" height="90" rx="18" fill="#fff" stroke="#cbd5e1" filter="url(#s)"/><text x="370" y="160" text-anchor="middle">FSM 拆階段</text><text x="370" y="188" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">Gray → Gaussian → Otsu → CCL</text><text x="370" y="208" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">避免單 cycle 巨大路徑</text>
<rect x="505" y="130" width="190" height="90" rx="18" fill="#fff" stroke="#cbd5e1" filter="url(#s)"/><text x="600" y="160" text-anchor="middle">暫存器切割</text><text x="600" y="188" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">counter / state / reg</text><text x="600" y="208" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">縮短 critical path</text>
<rect x="735" y="130" width="190" height="90" rx="18" fill="#fff" stroke="#cbd5e1" filter="url(#s)"/><text x="830" y="160" text-anchor="middle">資源共享</text><text x="830" y="188" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">加法/比較/計數器</text><text x="830" y="208" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">多 cycle 重複使用</text>
<rect x="965" y="130" width="190" height="90" rx="18" fill="#fff" stroke="#cbd5e1" filter="url(#s)"/><text x="1060" y="160" text-anchor="middle">重新驗證</text><text x="1060" y="188" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">RTL / SYN / SuperLint</text><text x="1060" y="208" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">P1~P4 pixel correct</text>
</g>
<g stroke="url(#g)" stroke-width="4" fill="none" marker-end="url(#arrow)"><path d="M235 175 H270"/><path d="M465 175 H500"/><path d="M695 175 H730"/><path d="M925 175 H960"/></g>
<rect x="70" y="285" width="1060" height="150" rx="24" fill="#ecfeff" stroke="#67e8f9"/>
<text x="95" y="325" font-size="22" font-family="Arial, Noto Sans TC" font-weight="800" fill="#155e75">優化後設計特性</text>
<text x="95" y="360" font-size="16" font-family="Arial, Noto Sans TC" fill="#164e63">1. 多狀態 FSM 分散影像處理負載，避免 RGB→Gray→Gaussian→Otsu→CCL→BBox 全部塞在同一條組合路徑。</text>
<text x="95" y="390" font-size="16" font-family="Arial, Noto Sans TC" fill="#164e63">2. Gaussian 固定權重除法改成 shift，Otsu 使用 histogram 掃描，降低乘除與比較邏輯面積。</text>
<text x="95" y="420" font-size="16" font-family="Arial, Noto Sans TC" fill="#164e63">3. 先以 box_map 標記邊界，再單一輸出階段寫回 AnsSRAM，讓 overlay 判斷邏輯簡潔且方便驗證。</text>
</svg>
