<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <linearGradient id="red" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff0f0"/>
    <stop offset="100%" stop-color="#ffd6d6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:36px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:22px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:17px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:14px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.4;rx:18;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:3.4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:2.8;stroke-dasharray:8 7;fill:none}
.phase{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:19px;font-weight:bold;fill:#174b78}
</style>
</defs>
<rect width="1400" height="700" fill="url(#bg)"/>

<text x="50" y="60" class="title">Algorithm Pipeline Implemented in Hardware</text>
<rect x="60" y="130" width="165" height="82" fill="url(#blue)" class="box"/><text x="95" y="178" class="txt">Read</text>
<path d="M225 171 H280" class="arrow"/>
<rect x="280" y="130" width="165" height="82" fill="url(#green)" class="box"/><text x="318" y="162" class="small">RGB to</text><text x="322" y="188" class="small">Gray</text>
<path d="M445 171 H500" class="arrow"/>
<rect x="500" y="130" width="175" height="82" fill="url(#green)" class="box"/><text x="525" y="162" class="small">3×3 Gaussian</text><text x="555" y="188" class="small">Filter</text>
<path d="M675 171 H730" class="arrow"/>
<rect x="730" y="130" width="175" height="82" fill="url(#orange)" class="box"/><text x="770" y="162" class="small">Otsu</text><text x="760" y="188" class="small">Threshold</text>
<path d="M905 171 H960" class="arrow"/>
<rect x="960" y="130" width="165" height="82" fill="url(#purple)" class="box"/><text x="995" y="178" class="txt">Mask</text>
<path d="M1125 171 H1180" class="arrow"/>
<rect x="1180" y="130" width="165" height="82" fill="url(#purple)" class="box"/><text x="1223" y="178" class="txt">CCL</text>

<path d="M1263 212 V290" class="arrow"/>
<rect x="1030" y="290" width="230" height="82" fill="url(#green)" class="box"/><text x="1065" y="322" class="small">Bounding Box</text><text x="1090" y="348" class="small">Extraction</text>
<path d="M1030 331 H950" class="arrow"/>
<rect x="720" y="290" width="230" height="82" fill="url(#blue)" class="box"/><text x="770" y="322" class="small">Box Map</text><text x="760" y="348" class="small">Generation</text>
<path d="M720 331 H640" class="arrow"/>
<rect x="410" y="290" width="230" height="82" fill="url(#orange)" class="box"/><text x="460" y="322" class="small">Overlay</text><text x="450" y="348" class="small">Green Border</text>
<path d="M410 331 H330" class="arrow"/>
<rect x="90" y="290" width="240" height="82" fill="url(#red)" class="box"/><text x="145" y="322" class="small">Write to</text><text x="135" y="348" class="small">AnsSRAM</text>

<rect x="120" y="490" width="1160" height="130" rx="18" fill="#fff" stroke="#c5d7e6" stroke-width="2"/>
<text x="160" y="535" class="txt">Hardware mapping concept</text>
<text x="160" y="572" class="small">Each algorithm block is not necessarily an independent module. In this design, they are integrated in drawBbox and scheduled by the FSM.</text>

</svg>