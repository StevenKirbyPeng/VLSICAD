<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:34px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:23px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:18px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:15px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.5;rx:20;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:3;stroke-dasharray:8 7;fill:none}
</style>
</defs>
<rect width="1200" height="680" fill="url(#bg)"/>

<text x="55" y="62" class="title">RTL Compile & Simulation Verification Flow</text>
<rect x="60" y="120" width="215" height="95" fill="url(#blue)" class="box"/>
<text x="92" y="158" class="txt">Source Files</text>
<text x="85" y="190" class="small">drawBbox.v / tb.sv</text>
<path d="M275 168 H350" class="arrow"/>
<rect x="350" y="120" width="215" height="95" fill="url(#green)" class="box"/>
<text x="385" y="158" class="txt">vlog Compile</text>
<text x="388" y="190" class="small">Errors = 0</text>
<path d="M565 168 H640" class="arrow"/>
<rect x="640" y="120" width="215" height="95" fill="url(#orange)" class="box"/>
<text x="688" y="158" class="txt">vsim Run</text>
<text x="675" y="190" class="small">run -all / batch mode</text>
<path d="M855 168 H930" class="arrow"/>
<rect x="930" y="120" width="215" height="95" fill="url(#purple)" class="box"/>
<text x="955" y="158" class="txt">Golden Check</text>
<text x="965" y="190" class="small">pixel compare</text>

<path d="M1038 215 V295" class="arrow"/>
<rect x="820" y="295" width="325" height="105" fill="url(#green)" class="box"/>
<text x="875" y="335" class="txt">Terminal Logs</text>
<text x="850" y="368" class="small">terminal_result_p1~p4.log</text>

<path d="M820 347 H700" class="arrow"/>
<rect x="420" y="295" width="280" height="105" fill="url(#blue)" class="box"/>
<text x="475" y="335" class="txt">BMP Output</text>
<text x="450" y="368" class="small">drawBbox_result_p1~p4.bmp</text>

<path d="M420 347 H295" class="arrow"/>
<rect x="60" y="295" width="235" height="105" fill="url(#orange)" class="box"/>
<text x="102" y="335" class="txt">Summary</text>
<text x="100" y="368" class="small">P1~P4 PASS, total 0</text>

<rect x="80" y="490" width="1040" height="110" rx="18" fill="#fff" stroke="#c5d7e6" stroke-width="2"/>
<text x="112" y="530" class="txt">Verification Goal</text>
<text x="112" y="565" class="small">Compile must report 0 errors. Simulation must compare every output pixel with golden data and generate 0 mismatches.</text>

</svg>