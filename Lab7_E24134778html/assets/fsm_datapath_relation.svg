<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <linearGradient id="red" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff0f0"/>
    <stop offset="100%" stop-color="#ffd6d6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:36px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:22px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:17px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:14px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.4;rx:18;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:3.4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:2.8;stroke-dasharray:8 7;fill:none}
.phase{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:19px;font-weight:bold;fill:#174b78}
</style>
</defs>
<rect width="1400" height="720" fill="url(#bg)"/>

<text x="50" y="60" class="title">FSM State vs. Datapath Relation</text>
<rect x="70" y="130" width="190" height="90" fill="url(#blue)" class="box"/>
<text x="104" y="168" class="txt">ImgROM</text><text x="102" y="198" class="small">S_LOAD</text>
<path d="M260 175 H330" class="arrow"/>
<rect x="330" y="130" width="190" height="90" fill="url(#green)" class="box"/>
<text x="363" y="168" class="txt">RGB→Gray</text><text x="377" y="198" class="small">S_GRAY</text>
<path d="M520 175 H590" class="arrow"/>
<rect x="590" y="130" width="220" height="90" fill="url(#green)" class="box"/>
<text x="620" y="168" class="txt">Gaussian + Hist</text><text x="650" y="198" class="small">S_GAUSS_HIST</text>
<path d="M810 175 H880" class="arrow"/>
<rect x="880" y="130" width="190" height="90" fill="url(#orange)" class="box"/>
<text x="920" y="168" class="txt">Otsu</text><text x="905" y="198" class="small">S_OTSU_SCAN</text>
<path d="M1070 175 H1140" class="arrow"/>
<rect x="1140" y="130" width="190" height="90" fill="url(#purple)" class="box"/>
<text x="1185" y="168" class="txt">Mask</text><text x="1165" y="198" class="small">S_MASK_WRITE</text>

<path d="M1235 220 V310" class="arrow"/>
<rect x="1060" y="310" width="250" height="90" fill="url(#purple)" class="box"/>
<text x="1130" y="348" class="txt">CCL</text><text x="1092" y="378" class="small">S_PARENT_INIT / S_CCL_SCAN</text>
<path d="M1060 355 H970" class="arrow"/>
<rect x="720" y="310" width="250" height="90" fill="url(#green)" class="box"/>
<text x="795" y="348" class="txt">BBox</text><text x="750" y="378" class="small">S_BBOX_INIT / S_BBOX_SCAN</text>
<path d="M720 355 H630" class="arrow"/>
<rect x="400" y="310" width="230" height="90" fill="url(#blue)" class="box"/>
<text x="460" y="348" class="txt">Box Map</text><text x="425" y="378" class="small">S_BOXMAP_CLEAR / GEN</text>
<path d="M400 355 H310" class="arrow"/>
<rect x="70" y="310" width="240" height="90" fill="url(#orange)" class="box"/>
<text x="128" y="348" class="txt">AnsSRAM</text><text x="115" y="378" class="small">S_DRAW_WRITE</text>

<rect x="115" y="505" width="1170" height="130" rx="18" fill="#fff" stroke="#c5d7e6" stroke-width="2"/>
<text x="150" y="548" class="txt">Design principle</text>
<text x="150" y="585" class="small">The FSM separates memory access, arithmetic processing, labeling, and final write-back. This improves readability, timing closure, and debug ability.</text>

</svg>