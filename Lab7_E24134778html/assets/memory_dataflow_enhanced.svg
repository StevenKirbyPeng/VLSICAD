<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <linearGradient id="red" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff0f0"/>
    <stop offset="100%" stop-color="#ffd6d6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:36px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:22px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:17px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:14px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.4;rx:18;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:3.4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:2.8;stroke-dasharray:8 7;fill:none}
.phase{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:19px;font-weight:bold;fill:#174b78}
</style>
</defs>
<rect width="1400" height="820" fill="url(#bg)"/>

<text x="50" y="60" class="title">Internal Memory / Register Array Dataflow</text>
<rect x="70" y="125" width="230" height="90" fill="url(#blue)" class="box"/>
<text x="105" y="162" class="txt">rgb_mem</text><text x="100" y="192" class="small">original 32-bit RGB</text>
<path d="M300 170 H370" class="arrow"/>
<rect x="370" y="125" width="230" height="90" fill="url(#green)" class="box"/>
<text x="405" y="162" class="txt">gray_mem</text><text x="400" y="192" class="small">8-bit gray value</text>
<path d="M600 170 H670" class="arrow"/>
<rect x="670" y="125" width="230" height="90" fill="url(#green)" class="box"/>
<text x="705" y="162" class="txt">gauss_mem</text><text x="700" y="192" class="small">filtered gray value</text>
<path d="M900 170 H970" class="arrow"/>
<rect x="970" y="125" width="260" height="90" fill="url(#orange)" class="box"/>
<text x="1010" y="162" class="txt">histogram[0:255]</text><text x="1015" y="192" class="small">Otsu statistics</text>

<path d="M1100 215 V295" class="arrow"/>
<rect x="970" y="295" width="260" height="90" fill="url(#purple)" class="box"/>
<text x="1015" y="332" class="txt">mask_mem</text><text x="1010" y="362" class="small">foreground / background</text>
<path d="M970 340 H900" class="arrow"/>
<rect x="670" y="295" width="230" height="90" fill="url(#purple)" class="box"/>
<text x="705" y="332" class="txt">label_mem</text><text x="690" y="362" class="small">component labels</text>
<path d="M670 340 H600" class="arrow"/>
<rect x="370" y="295" width="230" height="90" fill="url(#purple)" class="box"/>
<text x="410" y="332" class="txt">parent[]</text><text x="390" y="362" class="small">union-find table</text>
<path d="M370 340 H300" class="arrow"/>
<rect x="70" y="295" width="230" height="90" fill="url(#green)" class="box"/>
<text x="100" y="332" class="txt">bbox arrays</text><text x="95" y="362" class="small">xmin/xmax/ymin/ymax</text>

<path d="M185 385 V465" class="arrow"/>
<rect x="70" y="465" width="230" height="90" fill="url(#blue)" class="box"/>
<text x="110" y="502" class="txt">box_map</text><text x="92" y="532" class="small">which pixel is boundary</text>
<path d="M300 510 H410" class="arrow"/>
<rect x="410" y="465" width="330" height="90" fill="url(#orange)" class="box"/>
<text x="470" y="502" class="txt">Overlay Selector</text><text x="445" y="532" class="small">box_map ? green : rgb_mem</text>
<path d="M740 510 H850" class="arrow"/>
<rect x="850" y="465" width="250" height="90" fill="url(#red)" class="box"/>
<text x="900" y="502" class="txt">AnsSRAM</text><text x="885" y="532" class="small">final 32-bit output</text>

<rect x="130" y="645" width="1120" height="115" fill="#fff" stroke="#c5d7e6" stroke-width="2" rx="18"/>
<text x="165" y="688" class="txt">Design advantage</text>
<text x="165" y="725" class="small">Intermediate memories isolate each algorithm stage, making pixel-perfect debug possible and reducing excessive combinational logic.</text>

</svg>