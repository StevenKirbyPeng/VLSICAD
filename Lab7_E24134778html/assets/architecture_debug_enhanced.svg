<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#eef7ff"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" x2="1">
    <stop offset="0%" stop-color="#dff0ff"/>
    <stop offset="100%" stop-color="#b9dbff"/>
  </linearGradient>
  <linearGradient id="green" x1="0" x2="1">
    <stop offset="0%" stop-color="#e7f8ec"/>
    <stop offset="100%" stop-color="#c9efd4"/>
  </linearGradient>
  <linearGradient id="orange" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff3df"/>
    <stop offset="100%" stop-color="#ffe0ad"/>
  </linearGradient>
  <linearGradient id="purple" x1="0" x2="1">
    <stop offset="0%" stop-color="#f1e7ff"/>
    <stop offset="100%" stop-color="#d9c5ff"/>
  </linearGradient>
  <linearGradient id="red" x1="0" x2="1">
    <stop offset="0%" stop-color="#fff0f0"/>
    <stop offset="100%" stop-color="#ffd6d6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174b78" flood-opacity="0.18"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M2,2 L10,6 L2,10 Z" fill="#39536b"/>
  </marker>
<style>
.title{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:36px;font-weight:800;fill:#174b78}
.txt{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:22px;fill:#1f2937}
.small{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:17px;fill:#374151}
.tiny{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:14px;fill:#52606d}
.box{stroke:#4b83c3;stroke-width:2.4;rx:18;filter:url(#shadow)}
.arrow{stroke:#39536b;stroke-width:3.4;marker-end:url(#arrow);fill:none}
.dash{stroke:#6385a7;stroke-width:2.8;stroke-dasharray:8 7;fill:none}
.phase{font-family:Arial,'Microsoft JhengHei',sans-serif;font-size:19px;font-weight:bold;fill:#174b78}
</style>
</defs>
<rect width="1400" height="720" fill="url(#bg)"/>

<text x="50" y="60" class="title">Architecture-Oriented Debug Flow</text>
<rect x="80" y="130" width="260" height="110" fill="url(#blue)" class="box"/>
<text x="118" y="175" class="txt">Read Issue</text><text x="110" y="210" class="small">check Img_A / Img_Q</text>
<path d="M340 185 H420" class="arrow"/>
<rect x="420" y="130" width="260" height="110" fill="url(#green)" class="box"/>
<text x="452" y="175" class="txt">Preprocess Issue</text><text x="450" y="210" class="small">check gray / gaussian</text>
<path d="M680 185 H760" class="arrow"/>
<rect x="760" y="130" width="260" height="110" fill="url(#orange)" class="box"/>
<text x="790" y="175" class="txt">Mask Issue</text><text x="790" y="210" class="small">check threshold / polarity</text>
<path d="M1020 185 H1100" class="arrow"/>
<rect x="1100" y="130" width="260" height="110" fill="url(#purple)" class="box"/>
<text x="1135" y="175" class="txt">CCL Issue</text><text x="1130" y="210" class="small">check label / parent</text>

<rect x="245" y="345" width="300" height="110" fill="url(#green)" class="box"/>
<text x="285" y="390" class="txt">BBox Issue</text><text x="275" y="425" class="small">check xmin/xmax/ymin/ymax</text>
<path d="M545 400 H625" class="arrow"/>
<rect x="625" y="345" width="300" height="110" fill="url(#blue)" class="box"/>
<text x="665" y="390" class="txt">Draw Issue</text><text x="660" y="425" class="small">check box_map / Ans_D</text>
<path d="M925 400 H1005" class="arrow"/>
<rect x="1005" y="345" width="260" height="110" fill="url(#red)" class="box"/>
<text x="1040" y="390" class="txt">Output Issue</text><text x="1038" y="425" class="small">check BMP / golden diff</text>

<rect x="170" y="555" width="1060" height="110" rx="18" fill="#fff" stroke="#c5d7e6" stroke-width="2"/>
<text x="210" y="595" class="txt">Debug principle</text>
<text x="210" y="632" class="small">The internal architecture stores intermediate results, so each stage can be verified separately before checking the final BMP.</text>

</svg>